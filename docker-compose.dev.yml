version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: fastapi-dev
    ports:
      - "8000:8000"
    volumes:
      - .:/app  # 🔥 clave para desarrollo (hot reload)
    environment:
      - ENV=development
    restart: always

    # Opcional: si usas base de datos
    depends_on:
      - db

  db:
    image: postgres:15
    container_name: postgres-dev
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: olimpiadas_bd_v2
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
